"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 2, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_dir_first = true
linemode       = "size_mtime_perm"
show_hidden    = true
show_symlink   = true


[log]
enabled = true
level = "trace"  # Or "trace" for more detailed logs
# level = "debug"  # Or "trace" for more detailed logs
file = "yazi.log"

[preview]
tab_size       = 2
max_width      = 2000
max_height     = 1600
image_filter   = "triangle"
image_quality  = 75
svg_precision  = 2
# sixel_fraction was removed in v26 - it's now automatic

[opener]
edit = [
    { run = 'code "$@"', desc = "🖥️ VS Code", for = "macos" },
	{ run = 'code %*',    orphan = true, desc = "code",           for = "windows" },
	{ run = 'code -w %*', block = true,  desc = "code (block)",   for = "windows" },
    { run = 'code "$@"', orphan = true, desc = "🖥️ VS Code", for = "linux" },
]
edit-large = [
    { run = 'cot "$@"', block = false, desc = "🗻 CotEditor for large files", for = "macos" },
]
sys-open = [
    { run = 'open "$@"', desc = " Open with macOS settings", orphan = true, for = "macos" },
	{ run = 'xdg-open "$1"', orphan = true, desc = "Open with OS settings", for = "linux" },
	{ run = 'start "" "%1"', orphan = true, desc = "Open with Windows settings", for = "windows" },
]
quicklook = [
    # { run = 'osascript -e "tell application \"Finder\" to reveal POSIX file \"$1\"" -e "tell application \"Finder\" to activate" -e "tell application \"System Events\" to delay 0.5" -e "tell application \"System Events\" to keystroke \" \""', orphan = true, desc = "🔍 Quicklook" }
    { run = 'qlmanage -p "$1" >/dev/null 2>&1', desc = "🔍 Quicklook", orphan = true , for = "macos"},
]
# * for batch rename
terminal-block = [
    { run = 'code --wait "$@"', desc = "-", block = true },
]
play = [
	{ run = "open %s",         desc = "▶️ Play", for = "macos" },
	{ run = "xdg-open %s1",    desc = "▶️ Play", for = "linux", orphan = true },
	{ run = 'start "" %s1',    desc = "▶️ Play", for = "windows", orphan = true },
	{ run = "termux-open %s1", desc = "Play", for = "android" },
]
mediainfo = [
    { run = "mediainfo %s1; echo 'Press any key'; read -n 1", block = true, desc = "🎬 Show media info", for = "unix" },
	{ run = "mediainfo %s1 & pause", block = true, desc = "🎬 Show media info", for = "windows" },
]
exif = [
    # { run = 'zsh -c "exiftool \"$1\" | bat"', block = true, desc = "📸 Show Full EXIF" }
    # { run = 'exiftool "$1"', block = true, desc = "📸 Show Full EXIF" }
    { run = 'zsh -c "exiftool \"$1\" | bat --language yaml --style=header,grid; echo \"\nPress any key\"; read -k 1"', block = true, desc = "📸 Show full EXIF" }
]
download = [
	{ run = "ya emit download --open %S", desc = "🌐 Download and open" },
	{ run = "ya emit download %S",        desc = "🌐 Download" },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "📦 Extract here" },
]
compress = [
    { run = '~/.config/yazi/scripts/zip_selected.sh "$@"', block = true, desc = "🗜️ Zip files" },
]
reveal = [
    { run = 'open -R "$1"', desc = " Reveal in Finder", for = "macos" }
]
duckdb-ui = [
    { run = 'duckdb -ui "$1"', block = true, desc = "🦆 DuckDB UI" }
]
explain = [
    { run = 'nu ~/.config/yazi/scripts/explain.sh "$1"', block = true, desc = "💡 Explain schema" }
]
chmod = [
    { run = 'ya emit plugin chmod', desc = "✍️ Chmod on selected files" }
]
pgp-encrypt = [
    { run = '~/.config/yazi/scripts/gpg_sign_encrypt_selected.sh "$@"', block = true, desc = "🔐 Encrypt Files pgp" },
    { run = '~/.config/yazi/scripts/gpg_sign_encrypt_selected.sh -s "$@"', block = true, desc = "🔐🖊️ Sign+Encrypt Files pgp" },
    { run = '~/.config/yazi/scripts/gpg_create_sig_selected.sh "$@"', block = true, desc = "🖊️ Create sig for Files" },
]
pgp-decrypt = [
    { run = '~/.config/yazi/scripts/gpg_decrypt_selected.sh "$@"', block = true, desc = "🔓 Decrypt Files pgp" },
    { run = 'gpg --list-packets "$@" | grep -A 1 "signature packet"; echo "Press any key"; read -n 1', block = true, desc = "📦🔍 List packets" },
]
sig = [
    { run = '~/.config/yazi/scripts/gpg_verify_signature.sh "$1"', block = true, desc = "❔ Verify sig pgp" },
]
terminal-show = [
    { run = 'bat "$@"; echo "Press any key"; read -n 1', desc = "⚡ Show in terminal", block = true },
]
show-dir-size = [
    { run = 'ncdu -r --show-itemcount --color dark-bg "$1"', block = true, desc = "📏 Show Size" }
]

[open] 
rules = [
	{ url = "*.{duckdb,sqlite,sqlite3,db}", use = [ "duckdb-ui","explain","reveal","compress"] },
	{ url = "*.{json,yaml,yml,xml,toml}", use = [ "sys-open","edit","explain","reveal","terminal-show"] },
    { url = "*.{sh,nu,ps1,py,lua,r,conf}", use = [ "edit","sys-open", "reveal","chmod","terminal-show" ] },
    { url = "*.{txt,csv}", use = [ "edit","edit-large","reveal","terminal-block","pgp-encrypt","compress" ] },
    { mime = "application/pdf", use = [ "sys-open","reveal","pgp-encrypt","compress" ] },

    { url = "*.{gpg}", use = [ "pgp-decrypt","reveal" ] },
    { mime = "*/pgp-encrypted", use = [ "pgp-decrypt","reveal" ] },
    { mime = "*/pgp-keys", use = [ "pgp-decrypt","terminal-show","reveal" ] },


    { url = "*.{asc,key,pub}", use = [ "edit","terminal-show","reveal","chmod" ] },
    # { url = "*id_ed25519", use = [ "edit","terminal-show","reveal","chmod" ] },
    { url = "*id_{rsa,dsa,ecdsa,ed25519}*", use = [ "edit","terminal-show","reveal","chmod" ] },

    { url = "*.{sig}", use = [ "sig","edit","terminal-show","reveal" ] },

    { mime = "text/plain", use = [ "sys-open","edit","reveal","terminal-show" ] },
    { mime = "image/*", use = [ "sys-open","mediainfo","exif","reveal" ] },
    { mime = "text/html", use = [ "sys-open", "edit","reveal" ] },
    { url = "*/", use = [ "edit", "compress","show-dir-size","reveal" ] },
	# { mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "{audio,video}/*", use = [ "play", "mediainfo","exif", "reveal","pgp-encrypt" ] },
	# { mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal", "pgp-encrypt" ] },

	{ mime = "vfs/{absent,stale}", use = "download" },
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
    { url = "*", use = [ "sys-open", "quicklook","reveal", "edit" ] },
]

[plugin]

prepend_previewers = [
    # { url = "*.svg", run = "image", prio="high" },
    # { mime = "image/svg+xml", run = "image" },

	{ url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
    # { url = "*.md", run = "rich-preview" },   # also looks good

    { url = "*.rst", run = "rich-preview"}, # for restructured text (.rst) files
    { url = "*.ipynb", run = "rich-preview"}, # looks good
	{ url = "*.js", run = 'piper -- bat --color=always --style=numbers "$1"' },

	{ url = "*.json", run = "nbpreview" }, # looks better than rich

    { url = "*.csv", run = "duckdb" },
    { url = "*.tsv", run = "duckdb" },
    { url = "*.parquet", run = "duckdb" },
    { url = "*.db", run = "duckdb" },
    { url = "*.sqlite", run = "duckdb" },
    { url = "*.duckdb", run = "duckdb" },

    { url = "*.xlsx", run = "duckdb" },
    { url = "*.docx", run = "office" },
    { url = "*.pptx", run = "office" },
    { url = "*.ods", run = "office" },
    { mime = "video/*", run = "video" },
]

# This ensures extra metadata shows up in the right-hand pane
# prepend_spotters = [
#     { mime = "{image,video,audio}/*", run = "file-extra-metadata" },
# ]

prepend_fetchers = [
    # run on files AND directories
    { id = "mactag", url = "*", run = "mactag",prio="low", },
    { id = "mactag", url = "*/", run = "mactag",prio="low", },
]

[tasks]
# Increase the number of concurrent workers for image preloading
micro_workers    = 10
macro_workers    = 15
# Ensure SVGs don't get 'skipped' if they take more than a second to render
suppress_preload = false

[input]
# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

