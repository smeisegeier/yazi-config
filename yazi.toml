[select]
# The position of the menu (center is usually best for visibility)
border   = { fg = "blue" }
active   = { fg = "magenta", bold = true }
inactive = { }

# You can't set fixed width, but you can change the layout
# 'top-center', 'bottom-center', or 'center'
# 'center' feels "larger" because it occupies the focal point of the UI.
