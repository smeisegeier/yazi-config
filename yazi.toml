"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 2, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_dir_first = true
linemode       = "size_mtime_perm"
show_hidden    = true
show_symlink   = true


[log]
enabled = true
level = "trace"  # Or "trace" for more detailed logs
# level = "debug"  # Or "trace" for more detailed logs
file = "yazi.log"

[preview]
tab_size       = 2
max_width      = 2000
max_height     = 1600
image_filter   = "triangle"
image_quality  = 75
svg_precision  = 2
# sixel_fraction was removed in v26 - it's now automatic

[opener]
duckdb-ui = [
    # { run = 'echo "DEBUG: Rule Triggered for $1"; read -p "Press Enter..."', block = true, desc = "DEBUG DUCKDB" }    # { run = 'shell "duckdb -ui \"$1\"" --block', desc = "Open in DuckDB Web UI" },
	# { run = 'duckdb -ui "$@"', block = true, desc = "Open in DuckDB Web UI" },
    { run = 'duckdb -ui "$1"', block = true, desc = "DuckDB UI" }
]
edit = [
    { run = '${EDITOR:=code} "$@"', desc = "VS Code", for = "macos" },
	{ run = 'code %*',    orphan = true, desc = "code",           for = "windows" },
	{ run = 'code -w %*', block = true,  desc = "code (block)",   for = "windows" },
    { run = '${EDITOR:=kate} "$@"', desc = "KDE kate", block = true, orphan = false, for = "linux" },
]
sys-open = [
	{ run = 'xdg-open "$1"',                desc = "Open", for = "linux" },
    { run = 'open "$@"', desc = "Open", orphan = true, for = "macos" },
	{ run = 'start "" "%1"', orphan = true, desc = "Open", for = "windows" },
]

quicklook = [
    { run = 'osascript -e "tell application \"Finder\" to reveal POSIX file \"$1\"" -e "tell application \"Finder\" to activate" -e "tell application \"System Events\" to delay 0.5" -e "tell application \"System Events\" to keystroke \" \""', orphan = true, desc = "Quick Look" }
]

# * for rename
terminal-block = [
    { run = 'code --wait "$@"', desc = "edit", block = true },
]
play = [
	{ run = "xdg-open %s1",    desc = "Play", for = "linux", orphan = true },
	{ run = "open %s",         desc = "Play", for = "macos" },
	{ run = 'start "" %s1',    desc = "Play", for = "windows", orphan = true },
	{ run = "termux-open %s1", desc = "Play", for = "android" },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "unix" },
	{ run = "mediainfo %s1 & pause", block = true, desc = "Show media info", for = "windows" },
]
download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S",        desc = "Download" },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]
reveal = [
    { run = 'open -R "$1"', desc = "Reveal in Finder", for = "macos" }
]

[open] 
rules = [
	{ url = "*.duckdb", use = [ "duckdb-ui"] },
    { mime = "text/plain", use = [ "terminal-block" ] },
    # { mime = "image/svg+xml", use = [ "quicklook" ] },

    { mime = "text/shellscript", use = [ "edit" ] },
    { url = "*/", use = [ "edit", "reveal" ] },
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },

	{ mime = "vfs/{absent,stale}", use = "download" },
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
    { url = "*", use = [ "sys-open", "reveal", "edit" ] },
	# { url = "*", use = [ "open", "reveal" ] },
]

[plugin]
# USE PREPEND instead of fetchers to avoid breaking directory logic

# prepend_preloaders = [
#     { url = "*.svg", run = "image" },
#     { mime = "image/svg+xml", run = "image" },
# ]

prepend_previewers = [
    # { url = "*.svg", run = "image", prio="high" },
    # { mime = "image/svg+xml", run = "image" },

	{ url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
    # { url = "*.md", run = "rich-preview" },   # also looks good

    { url = "*.rst", run = "rich-preview"}, # for restructured text (.rst) files
    { url = "*.ipynb", run = "rich-preview"}, # looks good
	{ url = "*.js", run = 'piper -- bat --color=always --style=numbers "$1"' },

	{ url = "*.json", run = "nbpreview" }, # looks better than rich

    { url = "*.csv", run = "duckdb" },
    { url = "*.tsv", run = "duckdb" },
    { url = "*.parquet", run = "duckdb" },
    { url = "*.db", run = "duckdb" },
    { url = "*.sqlite", run = "duckdb" },
    { url = "*.duckdb", run = "duckdb" },

    { url = "*.xlsx", run = "duckdb" },
    { url = "*.docx", run = "office" },
    { url = "*.pptx", run = "office" },
    { url = "*.ods", run = "office" },
    { mime = "video/*", run = "video" },
]

# This ensures extra metadata shows up in the right-hand pane
# prepend_spotters = [
#     { mime = "{image,video,audio}/*", run = "file-extra-metadata" },
# ]

prepend_fetchers = [
    # run on files AND directories
    { id = "mactag", url = "*", run = "mactag",prio="low", },
    { id = "mactag", url = "*/", run = "mactag",prio="low", },
]

[tasks]
# Increase the number of concurrent workers for image preloading
micro_workers    = 10
macro_workers    = 15
# Ensure SVGs don't get 'skipped' if they take more than a second to render
suppress_preload = false

[input]
# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

